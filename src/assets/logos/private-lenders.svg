  <!-- Right Person -->
  <circle cx="52" cy="34" r="4" fill="#ECFEFF" />
  <path
    d="M48 42 C48 38.5 51 37 52 37 C53 37 56 38.5 56 42"
    fill="none"
    stroke="#ECFEFF"
    stroke-width="2"
    stroke-linecap="round"
  />

  <!-- Text: Private Lending Partners -->
  <text
    x="90"
    y="48"
    font-family="Inter, Arial, sans-serif"
    font-size="22"
