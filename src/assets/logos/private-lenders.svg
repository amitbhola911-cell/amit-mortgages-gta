<svg
  width="280"
  height="80"
  viewBox="0 0 280 80"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Icon Circle -->
  <circle cx="40" cy="40" r="32" fill="#0F766E" />

  <!-- House Roof -->
  <path
    d="M22 42 L40 28 L58 42"
    fill="none"
    stroke="#ECFEFF"
    stroke-width="3"
