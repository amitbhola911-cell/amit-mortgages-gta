<svg
  xmlns="http://www.w3.org/2000/svg"
  width="500"
  height="150"
  viewBox="0 0 500 150"
>
  <!-- House Roof (same style as your example) -->
  <path
    d="M40 90 L100 40 L160 90"
    fill="none"
    stroke="#C53030"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- House Base -->
  <rect
    x="70"
    y="90"
    width="60"
    height="40"
    fill="none"
    stroke="#000000"
    stroke-width="6"
    rx="4"
  />

  <!-- Door -->
  <rect
    x="95"
    y="100"
    width="20"
    height="30"
    fill="none"
    stroke="#000000"
    stroke-width="5"
    rx="2"
  />

  <!-- Text (same placement as your example) -->
  <text
    x="200"
    y="105"
    font-family="Arial, Helvetica, sans-serif"
    font-size="40"
    font-weight="700"
    fill="#000000"
  >
    Private Lending Partners
  </text>
</svg>
