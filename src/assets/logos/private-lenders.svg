  />

  <!-- Left Person -->
  <circle cx="28" cy="34" r="4" fill="#ECFEFF" />
  <path
    d="M24 42 C24 38.5 27 37 28 37 C29 37 32 38.5 32 42"
    fill="none"
    stroke="#ECFEFF"
